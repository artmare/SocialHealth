<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Заземление 5-4-3-2-1 — SOS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sos.css') }}">
</head>
<body>
    <main class="sos-wrap" id="groundRoot">
        <a class="sos-back" href="{{ url_for('sos.index') }}">← Назад</a>

        <h1 class="sos-title" style="font-size: 1.5rem; margin-bottom: 4px;">Техника заземления 5-4-3-2-1</h1>
        <p class="sos-subtitle" style="margin-bottom: 0;">Назови или запиши:</p>

        <div class="ground-wrap">
            <div class="ground-progress" aria-live="polite">
                <div id="groundProgressLabel" class="ground-progress-label">Шаг 1 из 5</div>
                <div class="ground-progress-bar">
                    <div id="groundProgressFill" class="ground-progress-fill"></div>
                </div>
            </div>

            <div id="groundStep"></div>

            <div id="groundFinish" class="ground-finish" style="display:none;">
                <h2>Отлично! Ты здесь и сейчас. 💙</h2>
                <p class="hint">Как ты себя чувствуешь?</p>
                <div class="feel-buttons">
                    <button type="button" class="btn-sos" data-feel="better">Лучше 😊</button>
                    <button type="button" class="btn-sos" data-feel="same">Так же 😐</button>
                    <button type="button" class="btn-sos" data-feel="help">Нужна помощь 😟</button>
                </div>

                <div id="groundHelpLine" class="help-line">
                    <p>Ты не один. Позвони — это бесплатно и анонимно:</p>
                    <a href="tel:88002000122" class="phone">8-800-2000-122</a>
                    <p style="color: var(--sos-text-muted); font-size: 0.85rem;">
                        Телефон доверия, круглосуточно
                    </p>
                </div>

                <div style="margin-top: 20px;">
                    <a href="{{ url_for('sos.index') }}" class="btn-sos">Вернуться на главную</a>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/sos.js') }}"></script>
</body>
</html>
