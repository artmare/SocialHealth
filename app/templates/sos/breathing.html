<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0c29">
    <meta name="robots" content="noindex">
    <title>{{ _("4-7-8 Breathing") }} — SOS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sos.css') }}">
</head>
<body>
    <main class="sos-wrap">
        <a class="sos-back" href="{{ url_for('sos.index') }}">{{ _("← Back") }}</a>

        <h1 class="sos-title" style="font-size: 1.4rem; margin-bottom: 4px;">{{ _("4-7-8 Breathing") }}</h1>
        <p class="sos-subtitle" style="margin-bottom: 0;">{{ _("Follow the circle. Inhale through the nose, exhale through the mouth.") }}</p>

        <div class="breath-stage">
            <div class="breath-circle-wrap" aria-hidden="true">
                <div id="breathCircle" class="breath-circle phase-exhale"></div>
            </div>

            <div class="breath-info" aria-live="polite">
                <div id="breathPhase" class="breath-phase">{{ _("Ready?") }}</div>
                <div id="breathCount" class="breath-count">4</div>
                <div id="breathCycle" class="breath-cycle">{{ _("Cycle 1 of ∞") }}</div>
            </div>

            <div class="breath-controls">
                <button type="button" id="breathToggle" class="btn-sos primary">{{ _("Start") }}</button>
                <button type="button" id="breathReset" class="btn-sos">{{ _("Reset") }}</button>
            </div>

            <label class="sound-toggle">
                <input type="checkbox" id="breathSound">
                {{ _("Soft beep on phase change") }}
            </label>
        </div>
    </main>

    
<script>
  window.SOS_BREATHING_I18N = {
    phases: [
      { label: {{ _("Inhale") | tojson }} },
      { label: {{ _("Hold your breath") | tojson }} },
      { label: {{ _("Exhale") | tojson }} },
    ],
    cycle_template: {{ _("Cycle {n} of ∞") | tojson }},
  };
</script>
<script src="{{ url_for('static', filename='js/sos.js') }}"></script>
</body>
</html>
