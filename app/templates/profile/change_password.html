{% extends 'base.html' %}

{% block title %}Смена пароля — SocialHealth{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
{% endblock %}

{% block content %}
<div class="profile-wrap" style="max-width: 520px;">
    <a href="{{ url_for('profile.index') }}" style="color:var(--text-muted); text-decoration:none;">← Назад к профилю</a>
    <h1 style="margin: 12px 0 18px;">Сменить пароль</h1>

    <form method="post" action="{{ url_for('profile.change_password') }}" class="card" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="field">
            <label for="current">Текущий пароль</label>
            <input type="password" id="current" name="current_password" required autocomplete="current-password">
        </div>

        <div class="field">
            <label for="new">Новый пароль (минимум 8 символов)</label>
            <input type="password" id="new" name="new_password" required minlength="8" autocomplete="new-password">
        </div>

        <div class="field">
            <label for="confirm">Подтвердите новый пароль</label>
            <input type="password" id="confirm" name="confirm_password" required minlength="8" autocomplete="new-password">
        </div>

        <div style="display:flex; gap:10px; margin-top: 8px;">
            <button type="submit" class="btn">Сменить пароль</button>
            <a href="{{ url_for('profile.index') }}" class="btn ghost">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
